services:
  web:
    build:
      context: ./app
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - caddy_data:/data       # Caddy stores ACME certs here
      - caddy_config:/config   # Caddy runtime config
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mptodo:
    build:
      context: ./mptodo
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8767:8767"
    volumes:
      - mptodo_data:/data

volumes:
  caddy_data:
  caddy_config:
  mptodo_data:
