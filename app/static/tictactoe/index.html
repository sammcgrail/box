<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f23;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 24px;
  }
  h1 {
    font-size: 2rem;
    color: #00d4ff;
    text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
  }
  #status {
    font-size: 1.2rem;
    min-height: 1.5em;
    color: #aaa;
  }
  #status.win { color: #4ade80; }
  #status.lose { color: #f87171; }
  #status.draw { color: #fbbf24; }
  #board {
    display: grid;
    grid-template-columns: repeat(3, 120px);
    grid-template-rows: repeat(3, 120px);
    gap: 6px;
    background: #1a1a3e;
    padding: 6px;
    border-radius: 12px;
    box-shadow: 0 0 30px rgba(0, 212, 255, 0.1);
  }
  .cell {
    background: #16163a;
    border: 2px solid #2a2a5a;
    border-radius: 8px;
    font-size: 3rem;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    user-select: none;
  }
  .cell:hover:not(.taken) {
    background: #1e1e50;
    border-color: #00d4ff;
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
  }
  .cell.taken { cursor: default; }
  .cell.x { color: #00d4ff; }
  .cell.o { color: #f87171; }
  .cell.win-cell {
    background: #1a3a1a;
    border-color: #4ade80;
    box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
  }
  #restart {
    padding: 12px 32px;
    font-size: 1rem;
    background: #00d4ff;
    color: #0f0f23;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.15s ease;
  }
  #restart:hover {
    background: #00b8d9;
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
  }
  #score {
    display: flex;
    gap: 32px;
    font-size: 1rem;
  }
  #score span { color: #888; }
  #score .val { color: #00d4ff; font-weight: bold; }
</style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="score">
    <span>Wins: <span class="val" id="wins">0</span></span>
    <span>Losses: <span class="val" id="losses">0</span></span>
    <span>Draws: <span class="val" id="draws">0</span></span>
  </div>
  <div id="status">Your turn — you're X</div>
  <div id="board"></div>
  <button id="restart">New Game</button>

<script>
const WIN_LINES = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

let board, gameOver, score = { wins: 0, losses: 0, draws: 0 };

function init() {
  board = Array(9).fill(null);
  gameOver = false;
  const el = document.getElementById('board');
  el.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.i = i;
    cell.addEventListener('click', () => playerMove(i));
    el.appendChild(cell);
  }
  setStatus("Your turn — you're X", '');
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls || '';
}

function updateBoard() {
  const cells = document.querySelectorAll('.cell');
  cells.forEach((cell, i) => {
    cell.textContent = board[i] === 'X' ? '✕' : board[i] === 'O' ? '○' : '';
    cell.className = 'cell' + (board[i] ? ' taken ' + board[i].toLowerCase() : '');
  });
}

function checkWin(mark) {
  for (const line of WIN_LINES) {
    if (line.every(i => board[i] === mark)) return line;
  }
  return null;
}

function highlightWin(line) {
  const cells = document.querySelectorAll('.cell');
  line.forEach(i => cells[i].classList.add('win-cell'));
}

function playerMove(i) {
  if (gameOver || board[i]) return;
  board[i] = 'X';
  updateBoard();

  const win = checkWin('X');
  if (win) {
    highlightWin(win);
    score.wins++;
    updateScore();
    setStatus('You win!', 'win');
    gameOver = true;
    return;
  }
  if (board.every(c => c)) {
    score.draws++;
    updateScore();
    setStatus("It's a draw!", 'draw');
    gameOver = true;
    return;
  }

  setTimeout(cpuMove, 300);
}

function cpuMove() {
  const move = getBestMove();
  if (move === -1) return;
  board[move] = 'O';
  updateBoard();

  const win = checkWin('O');
  if (win) {
    highlightWin(win);
    score.losses++;
    updateScore();
    setStatus('CPU wins!', 'lose');
    gameOver = true;
    return;
  }
  if (board.every(c => c)) {
    score.draws++;
    updateScore();
    setStatus("It's a draw!", 'draw');
    gameOver = true;
    return;
  }
  setStatus("Your turn", '');
}

function getBestMove() {
  const empty = board.map((v, i) => v === null ? i : -1).filter(i => i !== -1);
  if (!empty.length) return -1;

  // 1. Win if possible
  for (const i of empty) {
    board[i] = 'O';
    if (checkWin('O')) { board[i] = null; return i; }
    board[i] = null;
  }
  // 2. Block player win
  for (const i of empty) {
    board[i] = 'X';
    if (checkWin('X')) { board[i] = null; return i; }
    board[i] = null;
  }
  // 3. Take center
  if (empty.includes(4)) return 4;
  // 4. Take corner
  const corners = [0, 2, 6, 8].filter(i => empty.includes(i));
  if (corners.length) return corners[Math.floor(Math.random() * corners.length)];
  // 5. Take edge
  const edges = [1, 3, 5, 7].filter(i => empty.includes(i));
  if (edges.length) return edges[Math.floor(Math.random() * edges.length)];
  return empty[0];
}

function updateScore() {
  document.getElementById('wins').textContent = score.wins;
  document.getElementById('losses').textContent = score.losses;
  document.getElementById('draws').textContent = score.draws;
}

document.getElementById('restart').addEventListener('click', init);
init();
</script>
</body>
</html>
