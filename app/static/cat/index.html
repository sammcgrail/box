<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: monospace;
    color: #fff;
    cursor: pointer;
    user-select: none;
    overflow: hidden;
  }
  #cat {
    max-width: 90vw;
    max-height: 80vh;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(255,255,255,0.05);
    animation: spin linear infinite;
    animation-duration: var(--spin-duration, 4s);
    animation-direction: var(--spin-dir, normal);
  }
  #cat.loading { opacity: 0.3; }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  p {
    margin-top: 16px;
    color: #555;
    font-size: 14px;
  }
</style>
</head>
<body>
  <img id="cat" src="" alt="cat" />
  <p>click for another cat</p>
  <script>
    const img = document.getElementById('cat');

    // Randomize spin speed and direction
    function randomizeSpin() {
      const duration = (1.5 + Math.random() * 5).toFixed(2);
      const dir = Math.random() > 0.5 ? 'normal' : 'reverse';
      img.style.setProperty('--spin-duration', duration + 's');
      img.style.setProperty('--spin-dir', dir);
    }
    randomizeSpin();

    // Air horn — MAXIMUM MLG air horn sound via Web Audio API
    function playAirHorn() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const t = ctx.currentTime;
      const duration = 2.2;

      // DUAL compressors chained for maximum loudness
      const limiter = ctx.createDynamicsCompressor();
      limiter.threshold.setValueAtTime(-3, t);
      limiter.knee.setValueAtTime(0, t);
      limiter.ratio.setValueAtTime(20, t);
      limiter.attack.setValueAtTime(0, t);
      limiter.release.setValueAtTime(0.01, t);
      limiter.connect(ctx.destination);

      const compressor = ctx.createDynamicsCompressor();
      compressor.threshold.setValueAtTime(-15, t);
      compressor.knee.setValueAtTime(0, t);
      compressor.ratio.setValueAtTime(20, t);
      compressor.attack.setValueAtTime(0, t);
      compressor.release.setValueAtTime(0.05, t);
      compressor.connect(limiter);

      // Hard-clip distortion for that blown-out speaker feel
      const distortion = ctx.createWaveShaper();
      const curve = new Float32Array(512);
      for (let i = 0; i < 512; i++) {
        const x = (i * 2) / 512 - 1;
        curve[i] = Math.tanh(x * 4);
      }
      distortion.curve = curve;
      distortion.oversample = '4x';
      distortion.connect(compressor);

      const masterGain = ctx.createGain();
      masterGain.gain.setValueAtTime(1.0, t);
      masterGain.gain.setValueAtTime(1.0, t + duration * 0.75);
      masterGain.gain.exponentialRampToValueAtTime(0.01, t + duration);
      masterGain.connect(distortion);

      // MLG air horn harmonic series — MORE frequencies, MORE volume
      const hornFreqs = [
        { f: 240, vol: 0.35 },  // sub bass foundation
        { f: 360, vol: 0.25 },  // low mid body
        { f: 480, vol: 0.45 },  // core frequency
        { f: 540, vol: 0.30 },  // added mid punch
        { f: 600, vol: 0.40 },  // core frequency
        { f: 720, vol: 0.35 },  // upper harmonic
        { f: 840, vol: 0.25 },  // presence
        { f: 960, vol: 0.20 },  // sizzle
        { f: 1080, vol: 0.12 }, // extra top end
        { f: 1200, vol: 0.08 }, // air
      ];

      hornFreqs.forEach(({ f, vol }) => {
        // THREE detuned oscillators per frequency for mega width
        for (let detune of [-12, 0, 12]) {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sawtooth';
          osc.detune.setValueAtTime(detune + (Math.random() * 4 - 2), t);
          // Aggressive pitch bend up — the signature air horn attack
          osc.frequency.setValueAtTime(f * 0.92, t);
          osc.frequency.exponentialRampToValueAtTime(f, t + 0.06);
          // Slight vibrato for realism
          const lfo = ctx.createOscillator();
          const lfoGain = ctx.createGain();
          lfo.frequency.setValueAtTime(4 + Math.random() * 2, t);
          lfoGain.gain.setValueAtTime(f * 0.008, t);
          lfo.connect(lfoGain);
          lfoGain.connect(osc.frequency);
          lfo.start(t);
          lfo.stop(t + duration);
          // Gain envelope
          gain.gain.setValueAtTime(0, t);
          gain.gain.linearRampToValueAtTime(vol, t + 0.015);
          gain.gain.setValueAtTime(vol, t + duration * 0.65);
          gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
          osc.connect(gain);
          gain.connect(masterGain);
          osc.start(t);
          osc.stop(t + duration);
        }
      });

      // Square wave sub layer for that chest-thumping low end
      [240, 120].forEach(f => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(f * 0.95, t);
        osc.frequency.exponentialRampToValueAtTime(f, t + 0.05);
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.2, t + 0.02);
        gain.gain.setValueAtTime(0.2, t + duration * 0.6);
        gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
        osc.connect(gain);
        gain.connect(masterGain);
        osc.start(t);
        osc.stop(t + duration);
      });

      // BEEFY noise burst at the start — the pressurized "PSSHHHH" attack
      const noiseLen = ctx.sampleRate * 0.3;
      const noiseBuf = ctx.createBuffer(1, noiseLen, ctx.sampleRate);
      const noiseData = noiseBuf.getChannelData(0);
      for (let i = 0; i < noiseLen; i++) {
        noiseData[i] = (Math.random() * 2 - 1);
      }
      const noiseSrc = ctx.createBufferSource();
      const noiseGain = ctx.createGain();
      const noiseFilter = ctx.createBiquadFilter();
      noiseSrc.buffer = noiseBuf;
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.setValueAtTime(2500, t);
      noiseFilter.Q.setValueAtTime(0.8, t);
      noiseGain.gain.setValueAtTime(0.7, t);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      noiseSrc.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(masterGain);
      noiseSrc.start(t);

      // Second noise layer — high frequency hiss for extra aggression
      const hissLen = ctx.sampleRate * 0.2;
      const hissBuf = ctx.createBuffer(1, hissLen, ctx.sampleRate);
      const hissData = hissBuf.getChannelData(0);
      for (let i = 0; i < hissLen; i++) {
        hissData[i] = (Math.random() * 2 - 1);
      }
      const hissSrc = ctx.createBufferSource();
      const hissGain = ctx.createGain();
      const hissFilter = ctx.createBiquadFilter();
      hissSrc.buffer = hissBuf;
      hissFilter.type = 'highpass';
      hissFilter.frequency.setValueAtTime(4000, t);
      hissGain.gain.setValueAtTime(0.35, t);
      hissGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      hissSrc.connect(hissFilter);
      hissFilter.connect(hissGain);
      hissGain.connect(masterGain);
      hissSrc.start(t);
    }

    function loadCat() {
      playAirHorn();
      randomizeSpin();
      img.classList.add('loading');
      const url = 'https://cataas.com/cat?' + Date.now();
      const next = new Image();
      next.onload = () => { img.src = url; img.classList.remove('loading'); };
      next.onerror = () => { img.classList.remove('loading'); };
      next.src = url;
    }

    // Load first cat silently
    img.classList.add('loading');
    const first = 'https://cataas.com/cat?' + Date.now();
    const firstImg = new Image();
    firstImg.onload = () => { img.src = first; img.classList.remove('loading'); };
    firstImg.src = first;

    document.body.addEventListener('click', loadCat);
    document.addEventListener('keydown', (e) => { if (e.key === ' ' || e.key === 'Enter') loadCat(); });
  </script>
</body>
</html>
