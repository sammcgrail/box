<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paint — sebland.com</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --toolbar-bg: #c0c0c0;
    --toolbar-border: #808080;
    --toolbar-highlight: #ffffff;
    --toolbar-shadow: #404040;
    --active-tool: #000080;
    --active-tool-text: #ffffff;
    --canvas-bg: #ffffff;
  }

  body {
    background: #008080;
    font-family: 'Segoe UI', 'MS Sans Serif', Arial, sans-serif;
    font-size: 12px;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* Title bar */
  #titlebar {
    background: linear-gradient(90deg, #000080, #1084d0);
    color: white;
    padding: 2px 4px;
    font-weight: bold;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  #titlebar .icon { font-size: 14px; }

  /* Menu bar */
  #menubar {
    background: var(--toolbar-bg);
    border-bottom: 1px solid var(--toolbar-border);
    padding: 2px 4px;
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }

  #menubar button {
    background: none;
    border: none;
    padding: 2px 8px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }

  #menubar button:hover {
    background: var(--active-tool);
    color: var(--active-tool-text);
  }

  /* Main area */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Tool panel */
  #toolpanel {
    background: var(--toolbar-bg);
    border-right: 1px solid var(--toolbar-border);
    width: 58px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4px 2px;
    gap: 1px;
  }

  .tool-btn {
    width: 26px;
    height: 26px;
    background: var(--toolbar-bg);
    border: 1px solid transparent;
    border-top-color: var(--toolbar-highlight);
    border-left-color: var(--toolbar-highlight);
    border-bottom-color: var(--toolbar-shadow);
    border-right-color: var(--toolbar-shadow);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    line-height: 1;
    padding: 0;
  }

  .tool-btn:hover {
    border-top-color: var(--toolbar-shadow);
    border-left-color: var(--toolbar-shadow);
    border-bottom-color: var(--toolbar-highlight);
    border-right-color: var(--toolbar-highlight);
  }

  .tool-btn.active {
    border-top-color: var(--toolbar-shadow);
    border-left-color: var(--toolbar-shadow);
    border-bottom-color: var(--toolbar-highlight);
    border-right-color: var(--toolbar-highlight);
    background: #b0b0b0;
  }

  .tool-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
  }

  #toolpanel .section-label {
    font-size: 9px;
    color: #555;
    margin-top: 6px;
    margin-bottom: 2px;
  }

  /* Size selector */
  #size-section {
    margin-top: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  #size-section input[type="range"] {
    width: 48px;
    margin: 0;
  }

  #size-label {
    font-size: 9px;
    color: #333;
  }

  /* Canvas area */
  #canvas-area {
    flex: 1;
    overflow: auto;
    background: #808080;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  #canvas-wrapper {
    background: var(--canvas-bg);
    box-shadow: 2px 2px 8px rgba(0,0,0,0.3);
    position: relative;
    cursor: crosshair;
  }

  #canvas-wrapper canvas {
    display: block;
  }

  /* Color palette */
  #colorbar {
    background: var(--toolbar-bg);
    border-top: 1px solid var(--toolbar-border);
    padding: 4px 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  #active-colors {
    position: relative;
    width: 32px;
    height: 32px;
    flex-shrink: 0;
  }

  #bg-color-preview {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 20px;
    height: 20px;
    border: 1px solid #808080;
    background: #ffffff;
  }

  #fg-color-preview {
    position: absolute;
    top: 0;
    left: 0;
    width: 20px;
    height: 20px;
    border: 1px solid #808080;
    background: #000000;
    z-index: 1;
  }

  #palette {
    display: flex;
    flex-wrap: wrap;
    gap: 1px;
    max-width: 480px;
  }

  .color-swatch {
    width: 16px;
    height: 16px;
    border: 1px solid #808080;
    cursor: pointer;
  }

  .color-swatch:hover {
    border-color: #ffffff;
  }

  /* Status bar */
  #statusbar {
    background: var(--toolbar-bg);
    border-top: 1px solid var(--toolbar-border);
    padding: 2px 8px;
    font-size: 11px;
    color: #333;
    display: flex;
    gap: 16px;
    flex-shrink: 0;
  }

  /* Dropdown menus */
  .dropdown {
    display: none;
    position: absolute;
    background: var(--toolbar-bg);
    border: 1px solid var(--toolbar-border);
    border-top-color: var(--toolbar-highlight);
    border-left-color: var(--toolbar-highlight);
    border-bottom-color: var(--toolbar-shadow);
    border-right-color: var(--toolbar-shadow);
    z-index: 100;
    min-width: 160px;
    box-shadow: 2px 2px 4px rgba(0,0,0,0.2);
  }

  .dropdown.open { display: block; }

  .dropdown-item {
    padding: 4px 24px;
    cursor: pointer;
    white-space: nowrap;
  }

  .dropdown-item:hover {
    background: var(--active-tool);
    color: var(--active-tool-text);
  }

  .dropdown-separator {
    height: 1px;
    background: var(--toolbar-border);
    margin: 2px 4px;
  }
</style>
</head>
<body>

<div id="titlebar">
  <span class="icon">🎨</span>
  <span>untitled - Paint</span>
</div>

<div id="menubar">
  <button id="menu-file">File</button>
  <button id="menu-edit">Edit</button>
  <button id="menu-view">View</button>
  <button id="menu-help">Help</button>
</div>

<!-- File dropdown -->
<div class="dropdown" id="dropdown-file">
  <div class="dropdown-item" id="action-new">New</div>
  <div class="dropdown-separator"></div>
  <div class="dropdown-item" id="action-save">Save as PNG</div>
  <div class="dropdown-separator"></div>
  <div class="dropdown-item" id="action-resize">Resize Canvas...</div>
</div>

<!-- Edit dropdown -->
<div class="dropdown" id="dropdown-edit">
  <div class="dropdown-item" id="action-undo">Undo (Ctrl+Z)</div>
  <div class="dropdown-item" id="action-redo">Redo (Ctrl+Y)</div>
  <div class="dropdown-separator"></div>
  <div class="dropdown-item" id="action-clear">Clear Canvas</div>
</div>

<div id="main">
  <div id="toolpanel">
    <div class="tool-grid">
      <button class="tool-btn" data-tool="pencil" title="Pencil (P)">✏️</button>
      <button class="tool-btn" data-tool="brush" title="Brush (B)">🖌️</button>
      <button class="tool-btn" data-tool="eraser" title="Eraser (E)">🧹</button>
      <button class="tool-btn" data-tool="fill" title="Fill Bucket (G)">🪣</button>
      <button class="tool-btn" data-tool="eyedropper" title="Color Picker (I)">💉</button>
      <button class="tool-btn" data-tool="text" title="Text (T)">A</button>
      <button class="tool-btn" data-tool="line" title="Line (L)">╱</button>
      <button class="tool-btn" data-tool="rect" title="Rectangle (R)">▭</button>
      <button class="tool-btn" data-tool="fillrect" title="Filled Rectangle">▬</button>
      <button class="tool-btn" data-tool="circle" title="Ellipse (O)">○</button>
      <button class="tool-btn" data-tool="fillcircle" title="Filled Ellipse">●</button>
      <button class="tool-btn" data-tool="spray" title="Spray Can (S)">💨</button>
    </div>
    <div id="size-section">
      <span class="section-label">Size</span>
      <input type="range" id="brush-size" min="1" max="50" value="3">
      <span id="size-label">3px</span>
    </div>
  </div>

  <div id="canvas-area">
    <div id="canvas-wrapper">
      <canvas id="canvas"></canvas>
    </div>
  </div>
</div>

<div id="colorbar">
  <div id="active-colors">
    <div id="fg-color-preview"></div>
    <div id="bg-color-preview"></div>
  </div>
  <div id="palette"></div>
</div>

<div id="statusbar">
  <span id="status-pos">0, 0 px</span>
  <span id="status-size">800 × 600</span>
  <span id="status-tool">Pencil</span>
</div>

<script>
(function() {
  // --- Config ---
  const DEFAULT_WIDTH = 800;
  const DEFAULT_HEIGHT = 600;
  const MAX_UNDO = 50;

  // Classic MS Paint palette
  const PALETTE_COLORS = [
    '#000000','#808080','#800000','#808000','#008000','#008080','#000080','#800080',
    '#808040','#004040','#0080ff','#004080','#8000ff','#804000','#ffffff','#c0c0c0',
    '#ff0000','#ffff00','#00ff00','#00ffff','#0000ff','#ff00ff','#ffff80','#00ff80',
    '#80ffff','#8080ff','#ff0080','#ff8040','#c0c0c0','#a0a0a4','#f0fbff','#a4a0a0',
  ];

  // --- State ---
  let currentTool = 'pencil';
  let fgColor = '#000000';
  let bgColor = '#ffffff';
  let brushSize = 3;
  let drawing = false;
  let startX, startY, lastX, lastY;
  let undoStack = [];
  let redoStack = [];
  let previewCanvas, previewCtx;

  // --- DOM ---
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const wrapper = document.getElementById('canvas-wrapper');
  const fgPreview = document.getElementById('fg-color-preview');
  const bgPreview = document.getElementById('bg-color-preview');
  const palette = document.getElementById('palette');
  const brushSlider = document.getElementById('brush-size');
  const sizeLabel = document.getElementById('size-label');
  const statusPos = document.getElementById('status-pos');
  const statusSize = document.getElementById('status-size');
  const statusTool = document.getElementById('status-tool');

  // --- Init Canvas ---
  function initCanvas(w, h) {
    canvas.width = w;
    canvas.height = h;
    wrapper.style.width = w + 'px';
    wrapper.style.height = h + 'px';
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    statusSize.textContent = w + ' × ' + h;

    // Preview canvas for shape tools
    if (previewCanvas) previewCanvas.remove();
    previewCanvas = document.createElement('canvas');
    previewCanvas.width = w;
    previewCanvas.height = h;
    previewCanvas.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;';
    wrapper.appendChild(previewCanvas);
    previewCtx = previewCanvas.getContext('2d');

    undoStack = [];
    redoStack = [];
    saveState();
  }

  // --- Undo/Redo ---
  function saveState() {
    if (undoStack.length >= MAX_UNDO) undoStack.shift();
    undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
    redoStack = [];
  }

  function undo() {
    if (undoStack.length <= 1) return;
    redoStack.push(undoStack.pop());
    ctx.putImageData(undoStack[undoStack.length - 1], 0, 0);
  }

  function redo() {
    if (redoStack.length === 0) return;
    const state = redoStack.pop();
    undoStack.push(state);
    ctx.putImageData(state, 0, 0);
  }

  // --- Tools ---
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return {
      x: Math.floor((e.clientX - rect.left) * scaleX),
      y: Math.floor((e.clientY - rect.top) * scaleY)
    };
  }

  function drawLine(x1, y1, x2, y2, color, size, context) {
    const c = context || ctx;
    c.strokeStyle = color;
    c.lineWidth = size;
    c.lineCap = 'round';
    c.beginPath();
    c.moveTo(x1, y1);
    c.lineTo(x2, y2);
    c.stroke();
  }

  function drawRect(x1, y1, x2, y2, color, size, fill, context) {
    const c = context || ctx;
    const x = Math.min(x1, x2);
    const y = Math.min(y1, y2);
    const w = Math.abs(x2 - x1);
    const h = Math.abs(y2 - y1);
    if (fill) {
      c.fillStyle = color;
      c.fillRect(x, y, w, h);
    } else {
      c.strokeStyle = color;
      c.lineWidth = size;
      c.strokeRect(x, y, w, h);
    }
  }

  function drawEllipse(x1, y1, x2, y2, color, size, fill, context) {
    const c = context || ctx;
    const cx = (x1 + x2) / 2;
    const cy = (y1 + y2) / 2;
    const rx = Math.abs(x2 - x1) / 2;
    const ry = Math.abs(y2 - y1) / 2;
    c.beginPath();
    c.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
    if (fill) {
      c.fillStyle = color;
      c.fill();
    } else {
      c.strokeStyle = color;
      c.lineWidth = size;
      c.stroke();
    }
  }

  function floodFill(x, y, fillColor) {
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    const w = canvas.width;
    const h = canvas.height;

    // Parse fill color
    const fc = hexToRgb(fillColor);
    const targetIdx = (y * w + x) * 4;
    const tr = data[targetIdx], tg = data[targetIdx+1], tb = data[targetIdx+2], ta = data[targetIdx+3];

    // Don't fill if same color
    if (tr === fc.r && tg === fc.g && tb === fc.b && ta === 255) return;

    const stack = [[x, y]];
    const visited = new Uint8Array(w * h);

    while (stack.length > 0) {
      const [cx, cy] = stack.pop();
      if (cx < 0 || cx >= w || cy < 0 || cy >= h) continue;
      const idx = cy * w + cx;
      if (visited[idx]) continue;

      const pi = idx * 4;
      if (data[pi] !== tr || data[pi+1] !== tg || data[pi+2] !== tb || data[pi+3] !== ta) continue;

      visited[idx] = 1;
      data[pi] = fc.r;
      data[pi+1] = fc.g;
      data[pi+2] = fc.b;
      data[pi+3] = 255;

      stack.push([cx+1, cy], [cx-1, cy], [cx, cy+1], [cx, cy-1]);
    }

    ctx.putImageData(imageData, 0, 0);
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return { r, g, b };
  }

  function rgbToHex(r, g, b) {
    return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
  }

  function spray(x, y, color, size) {
    const density = size * 2;
    ctx.fillStyle = color;
    for (let i = 0; i < density; i++) {
      const angle = Math.random() * Math.PI * 2;
      const radius = Math.random() * size;
      const sx = x + Math.cos(angle) * radius;
      const sy = y + Math.sin(angle) * radius;
      ctx.fillRect(sx, sy, 1, 1);
    }
  }

  // --- Shape preview helpers ---
  function isShapeTool(tool) {
    return ['line', 'rect', 'fillrect', 'circle', 'fillcircle'].includes(tool);
  }

  function clearPreview() {
    previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
  }

  function drawShapePreview(tool, x1, y1, x2, y2) {
    clearPreview();
    switch(tool) {
      case 'line':
        drawLine(x1, y1, x2, y2, fgColor, brushSize, previewCtx);
        break;
      case 'rect':
        drawRect(x1, y1, x2, y2, fgColor, brushSize, false, previewCtx);
        break;
      case 'fillrect':
        drawRect(x1, y1, x2, y2, fgColor, brushSize, true, previewCtx);
        break;
      case 'circle':
        drawEllipse(x1, y1, x2, y2, fgColor, brushSize, false, previewCtx);
        break;
      case 'fillcircle':
        drawEllipse(x1, y1, x2, y2, fgColor, brushSize, true, previewCtx);
        break;
    }
  }

  function commitShape(tool, x1, y1, x2, y2) {
    switch(tool) {
      case 'line':
        drawLine(x1, y1, x2, y2, fgColor, brushSize);
        break;
      case 'rect':
        drawRect(x1, y1, x2, y2, fgColor, brushSize, false);
        break;
      case 'fillrect':
        drawRect(x1, y1, x2, y2, fgColor, brushSize, true);
        break;
      case 'circle':
        drawEllipse(x1, y1, x2, y2, fgColor, brushSize, false);
        break;
      case 'fillcircle':
        drawEllipse(x1, y1, x2, y2, fgColor, brushSize, true);
        break;
    }
  }

  // --- Mouse Events ---
  canvas.addEventListener('mousedown', function(e) {
    const pos = getPos(e);
    drawing = true;
    startX = lastX = pos.x;
    startY = lastY = pos.y;

    if (currentTool === 'pencil' || currentTool === 'brush') {
      ctx.strokeStyle = fgColor;
      ctx.lineWidth = currentTool === 'pencil' ? 1 : brushSize;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    } else if (currentTool === 'eraser') {
      ctx.strokeStyle = bgColor;
      ctx.lineWidth = brushSize;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    } else if (currentTool === 'spray') {
      spray(pos.x, pos.y, fgColor, brushSize);
    } else if (currentTool === 'fill') {
      floodFill(pos.x, pos.y, e.button === 2 ? bgColor : fgColor);
      saveState();
      drawing = false;
    } else if (currentTool === 'eyedropper') {
      const pixel = ctx.getImageData(pos.x, pos.y, 1, 1).data;
      fgColor = rgbToHex(pixel[0], pixel[1], pixel[2]);
      fgPreview.style.background = fgColor;
      drawing = false;
    } else if (currentTool === 'text') {
      const text = prompt('Enter text:');
      if (text) {
        ctx.fillStyle = fgColor;
        ctx.font = brushSize * 4 + 'px "Segoe UI", Arial, sans-serif';
        ctx.fillText(text, pos.x, pos.y);
        saveState();
      }
      drawing = false;
    }
  });

  canvas.addEventListener('mousemove', function(e) {
    const pos = getPos(e);
    statusPos.textContent = pos.x + ', ' + pos.y + ' px';

    if (!drawing) return;

    if (currentTool === 'pencil' || currentTool === 'brush') {
      drawLine(lastX, lastY, pos.x, pos.y, fgColor, currentTool === 'pencil' ? 1 : brushSize);
    } else if (currentTool === 'eraser') {
      drawLine(lastX, lastY, pos.x, pos.y, bgColor, brushSize);
    } else if (currentTool === 'spray') {
      spray(pos.x, pos.y, fgColor, brushSize);
    } else if (isShapeTool(currentTool)) {
      drawShapePreview(currentTool, startX, startY, pos.x, pos.y);
    }

    lastX = pos.x;
    lastY = pos.y;
  });

  window.addEventListener('mouseup', function(e) {
    if (!drawing) return;
    drawing = false;

    if (isShapeTool(currentTool)) {
      clearPreview();
      const pos = getPos(e);
      commitShape(currentTool, startX, startY, pos.x, pos.y);
    }

    saveState();
  });

  // Prevent context menu on canvas
  canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); });

  // --- Tool Selection ---
  document.querySelectorAll('.tool-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.tool-btn').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      currentTool = this.dataset.tool;
      const toolNames = {
        pencil: 'Pencil', brush: 'Brush', eraser: 'Eraser', fill: 'Fill Bucket',
        eyedropper: 'Color Picker', text: 'Text', line: 'Line', rect: 'Rectangle',
        fillrect: 'Filled Rect', circle: 'Ellipse', fillcircle: 'Filled Ellipse', spray: 'Spray Can'
      };
      statusTool.textContent = toolNames[currentTool] || currentTool;
    });
  });

  // Set initial active tool
  document.querySelector('[data-tool="pencil"]').classList.add('active');

  // --- Brush Size ---
  brushSlider.addEventListener('input', function() {
    brushSize = parseInt(this.value);
    sizeLabel.textContent = brushSize + 'px';
  });

  // --- Color Palette ---
  PALETTE_COLORS.forEach(function(color) {
    const swatch = document.createElement('div');
    swatch.className = 'color-swatch';
    swatch.style.background = color;
    swatch.addEventListener('click', function() {
      fgColor = color;
      fgPreview.style.background = color;
    });
    swatch.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      bgColor = color;
      bgPreview.style.background = color;
    });
    palette.appendChild(swatch);
  });

  // --- Keyboard Shortcuts ---
  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    if (e.ctrlKey || e.metaKey) {
      switch(e.key.toLowerCase()) {
        case 'z':
          e.preventDefault();
          if (e.shiftKey) redo(); else undo();
          break;
        case 'y':
          e.preventDefault();
          redo();
          break;
        case 's':
          e.preventDefault();
          savePNG();
          break;
        case 'n':
          e.preventDefault();
          newCanvas();
          break;
      }
      return;
    }

    switch(e.key.toLowerCase()) {
      case 'p': selectTool('pencil'); break;
      case 'b': selectTool('brush'); break;
      case 'e': selectTool('eraser'); break;
      case 'g': selectTool('fill'); break;
      case 'i': selectTool('eyedropper'); break;
      case 't': selectTool('text'); break;
      case 'l': selectTool('line'); break;
      case 'r': selectTool('rect'); break;
      case 'o': selectTool('circle'); break;
      case 's': selectTool('spray'); break;
    }
  });

  function selectTool(tool) {
    document.querySelectorAll('.tool-btn').forEach(function(b) { b.classList.remove('active'); });
    const btn = document.querySelector('[data-tool="' + tool + '"]');
    if (btn) {
      btn.classList.add('active');
      btn.click();
    }
  }

  // --- Menu Actions ---
  function newCanvas() {
    if (confirm('Start a new canvas? Unsaved work will be lost.')) {
      initCanvas(canvas.width, canvas.height);
    }
  }

  function savePNG() {
    const link = document.createElement('a');
    link.download = 'painting.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  function resizeCanvas() {
    const w = prompt('Width:', canvas.width);
    if (!w) return;
    const h = prompt('Height:', canvas.height);
    if (!h) return;
    const nw = parseInt(w), nh = parseInt(h);
    if (nw > 0 && nh > 0) {
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      canvas.width = nw;
      canvas.height = nh;
      wrapper.style.width = nw + 'px';
      wrapper.style.height = nh + 'px';
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, nw, nh);
      ctx.putImageData(imageData, 0, 0);
      previewCanvas.width = nw;
      previewCanvas.height = nh;
      statusSize.textContent = nw + ' × ' + nh;
      saveState();
    }
  }

  function clearCanvas() {
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    saveState();
  }

  // --- Menu Dropdowns ---
  let openMenu = null;

  function toggleMenu(menuId, btnEl) {
    closeMenus();
    const dd = document.getElementById(menuId);
    const rect = btnEl.getBoundingClientRect();
    dd.style.left = rect.left + 'px';
    dd.style.top = rect.bottom + 'px';
    dd.classList.add('open');
    openMenu = dd;
  }

  function closeMenus() {
    document.querySelectorAll('.dropdown').forEach(function(d) { d.classList.remove('open'); });
    openMenu = null;
  }

  document.getElementById('menu-file').addEventListener('click', function() {
    toggleMenu('dropdown-file', this);
  });
  document.getElementById('menu-edit').addEventListener('click', function() {
    toggleMenu('dropdown-edit', this);
  });

  document.getElementById('action-new').addEventListener('click', function() { closeMenus(); newCanvas(); });
  document.getElementById('action-save').addEventListener('click', function() { closeMenus(); savePNG(); });
  document.getElementById('action-resize').addEventListener('click', function() { closeMenus(); resizeCanvas(); });
  document.getElementById('action-undo').addEventListener('click', function() { closeMenus(); undo(); });
  document.getElementById('action-redo').addEventListener('click', function() { closeMenus(); redo(); });
  document.getElementById('action-clear').addEventListener('click', function() { closeMenus(); clearCanvas(); });

  document.addEventListener('click', function(e) {
    if (openMenu && !openMenu.contains(e.target) && !e.target.closest('#menubar')) {
      closeMenus();
    }
  });

  // --- Touch Support ---
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    const touch = e.touches[0];
    canvas.dispatchEvent(new MouseEvent('mousedown', {
      clientX: touch.clientX, clientY: touch.clientY
    }));
  }, { passive: false });

  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    const touch = e.touches[0];
    canvas.dispatchEvent(new MouseEvent('mousemove', {
      clientX: touch.clientX, clientY: touch.clientY
    }));
  }, { passive: false });

  canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    window.dispatchEvent(new MouseEvent('mouseup', {}));
  }, { passive: false });

  // --- Init ---
  initCanvas(DEFAULT_WIDTH, DEFAULT_HEIGHT);
})();
</script>
</body>
</html>
