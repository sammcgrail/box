<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEBLAND</title>
    <link rel="preload" href="/fonts/press-start-2p.woff2" as="font" type="font/woff2" crossorigin>
    <style>
      @font-face {
        font-family: 'Press Start 2P';
        font-style: normal;
        font-weight: 400;
        font-display: block;
        src: url('/fonts/press-start-2p.woff2') format('woff2');
      }
      body { margin: 0; background: #09090b; }
      #shell {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 4rem 1.5rem;
        min-height: 100vh;
      }
      #shell-title {
        font-family: 'Press Start 2P', monospace;
        font-size: clamp(2.2rem, 10vw, 4rem);
        font-weight: 900;
        letter-spacing: 0.08em;
        line-height: 1;
        margin: 0 0 0.5rem;
        color: transparent;
        background: linear-gradient(90deg, #4ade80, #22d3ee, #a855f7, #f472b6, #facc15, #4ade80);
        background-size: 300% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        animation: g 8s linear infinite;
        filter: drop-shadow(0 0 20px rgba(74, 222, 128, 0.4));
      }
      #shell-sub {
        font-size: 0.875rem;
        color: #71717a;
        margin: 0 0 3rem;
        font-family: system-ui, sans-serif;
      }
      @keyframes g {
        0% { background-position: 0% 50%; }
        100% { background-position: 300% 50%; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="shell">
        <h1 id="shell-title">SEBLAND</h1>
        <p id="shell-sub">tiny apps, built by robots</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
